name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install uv
        run: pip install uv
      
      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check analytics/ configs/ models/ tests/ generate_logs.py

      - name: Run ingest tests
        run: uv run pytest tests/test_ingest.py

      - name: Run metrics tests
        run: uv run pytest tests/test_metrics.py

      - name: Run local pipeline script
        run: ./run.sh local

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Docker image
        run: docker build -t data-assignment:latest .

      - name: Run Docker pipeline
        run: docker compose --profile full run --rm all