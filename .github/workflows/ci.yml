name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install uv
        run: pip install uv
      
      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check analytics/ configs/ models/ tests/ generate_logs.py

      - name: Run tests
        run: uv run pytest

      - name: Generate test logs
        run: uv run python generate_logs.py --tasks 200 --out sample_logs/app.log

      - name: Validate ingest
        run: |
          rm -f analytics.duckdb analytics.duckdb.wal
          uv run python -m analytics.ingest sample_logs
          uv run python -m analytics.ingest sample_logs

      - name: Generate analytics report
        run: uv run python -m analytics.report